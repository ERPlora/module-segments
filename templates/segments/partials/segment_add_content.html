{% load djicons i18n %}
<div data-back-url="{% url 'segments:segments_list' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Add Segment" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'segments:segments_list' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="add-segment-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="add-segment-form"
          hx-post="{% url 'segments:segment_add' %}">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Name" %}</label>
                <input type="text" name="name" class="input input-sm w-full" placeholder="{% trans 'Name' %}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Description" %}</label>
                <textarea name="description" class="textarea textarea-sm w-full" rows="3"></textarea>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Color" %}</label>
                <select name="color" class="select select-sm w-full">
                <option value="">{% trans "Select..." %}</option>
                </select>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Is Active" %}</label>
                <label class="toggle color-success">
                <input type="checkbox" name="is_active">
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Is Dynamic" %}</label>
                <label class="toggle color-success">
                <input type="checkbox" name="is_dynamic">
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Customer Count" %}</label>
                <input type="number" name="customer_count" class="input input-sm w-full"  placeholder="0">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Last Calculated At" %}</label>
                <input type="datetime-local" name="last_calculated_at" class="input input-sm w-full">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Logic Operator" %}</label>
                <select name="logic_operator" class="select select-sm w-full">
                <option value="">{% trans "Select..." %}</option>
                </select>
                </div>
            </div>
        </div>
    </form>
</div>
