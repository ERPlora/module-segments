{% load djicons i18n %}

<div class="p-4">
    <div class="mb-6">
        <h1 class="text-2xl font-bold">{% trans "Settings" %}</h1>
        <p class="text-sm mt-1 opacity-60">{% trans "Module configuration" %}</p>
    </div>

    <form hx-post="{% url 'segments:settings' %}" hx-swap="none">
        {% csrf_token %}
        <div class="card">
            <div class="card-body divide-y divide-base-300">
                <div class="flex items-center justify-between py-4 first:pt-0 last:pb-0">
                    <div class="flex-1 pr-4">
                        <h3 class="font-semibold text-sm">{% trans "Auto Refresh Minutes" %}</h3>
                    </div>
                    <input type="number" name="auto_refresh_minutes" class="input input-sm w-48" value="{{ config.auto_refresh_minutes }}">
                </div>
                <div class="flex items-center justify-between py-4 first:pt-0 last:pb-0">
                    <div class="flex-1 pr-4">
                        <h3 class="font-semibold text-sm">{% trans "Max Segment Size" %}</h3>
                    </div>
                    <input type="number" name="max_segment_size" class="input input-sm w-48" value="{{ config.max_segment_size }}">
                </div>
            </div>
        </div>
        <div class="flex justify-end mt-4">
            <button type="submit" class="btn color-primary">
                {% icon "checkmark-outline" %} {% trans "Save Settings" %}
            </button>
        </div>
    </form>
</div>
