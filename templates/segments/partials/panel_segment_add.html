{% load djicons i18n %}

<!-- Header -->
<div class="side-sheet-header">
    <h3 class="sheet-title">{% trans "New Segment" %}</h3>
    <button class="sheet-close" @click="closePanel()">
        {% icon "close-outline" %}
    </button>
</div>

<!-- Body -->
<div class="side-sheet-content">
    <form id="add-segment-form"
          hx-post="{% url 'segments:add' %}"
          hx-target="#segments-list-body"
          hx-swap="innerHTML"
          @htmx:after-request="closePanel()"
          class="flex flex-col gap-4 p-6">
        {% csrf_token %}

        <!-- Name -->
        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Name" %} *</label>
            <input type="text" name="name" class="input input-sm w-full"
                   placeholder="{% trans 'e.g., VIP Customers, Inactive 90 days' %}" required>
        </div>

        <!-- Description -->
        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Description" %}</label>
            <textarea name="description" class="textarea textarea-sm w-full" rows="2"
                      placeholder="{% trans 'Describe what this segment represents...' %}"></textarea>
        </div>

        <!-- Color -->
        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Color" %}</label>
            <select name="color" class="select select-sm w-full">
                <option value="primary">{% trans "Primary" %}</option>
                <option value="success">{% trans "Success" %}</option>
                <option value="warning">{% trans "Warning" %}</option>
                <option value="error">{% trans "Error" %}</option>
                <option value="neutral">{% trans "Neutral" %}</option>
            </select>
        </div>

        <!-- Logic Operator -->
        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Rule Logic" %}</label>
            <select name="logic_operator" class="select select-sm w-full">
                <option value="and">{% trans "All rules must match (AND)" %}</option>
                <option value="or">{% trans "Any rule must match (OR)" %}</option>
            </select>
        </div>

        <!-- Dynamic -->
        <div class="flex items-center justify-between">
            <div>
                <label class="text-sm font-medium block">{% trans "Dynamic Segment" %}</label>
                <p class="text-xs text-base-content/50">{% trans "Auto-updates when rules change" %}</p>
            </div>
            <label class="toggle toggle-sm color-primary">
                <input type="checkbox" name="is_dynamic" checked>
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </label>
        </div>

        <!-- Active -->
        <div class="flex items-center justify-between">
            <div>
                <label class="text-sm font-medium block">{% trans "Active" %}</label>
                <p class="text-xs text-base-content/50">{% trans "Inactive segments won't be evaluated" %}</p>
            </div>
            <label class="toggle toggle-sm color-success">
                <input type="checkbox" name="is_active" checked>
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </label>
        </div>
    </form>
</div>

<!-- Footer -->
<div class="side-sheet-footer">
    <div class="flex justify-end gap-2">
        <button type="button" class="btn btn-ghost btn-sm" @click="closePanel()">
            {% trans "Cancel" %}
        </button>
        <button type="submit" form="add-segment-form" class="btn btn-sm color-primary">
            {% icon "add-outline" %}
            {% trans "Create Segment" %}
        </button>
    </div>
</div>
